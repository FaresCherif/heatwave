<head>
    <link rel="stylesheet" href="src/styles/stylesheet.css">
    <link rel="stylesheet" href="src/styles/stylesheet_bars.css">
    <link rel="stylesheet" href="src/styles/stylesheet_gameover.css">

    <script src="src/scrpitBar.js"></script>
    <script src="src/scriptClock.js"></script>
    <script src="src/scriptGame.js"></script>
</head>
<body>
    <div class="room">
        <div class="background">

            <div class="game-over-screen" id="gameOverScreen">
                <div class="game-over-content">
                    <h1>GAME OVER</h1>
                    <p id="gameOverReason"></p>
                    <button onclick="location.reload()">Recommencer</button>
                </div>
            </div>

            <div class="bars-container">
                <div class="stat-bar-vertical">
                    <label>Travail</label>
                    <div class="bar-bg">
                        <div class="work-bar-fill"></div>
                    </div>
                </div>
                <div class="stat-bar-vertical">
                    <label>Chaleur</label>
                    <div class="bar-bg">
                        <div class="heat-bar-fill"></div>
                    </div>
                </div>
            </div>

            <div class="clock"></div>
            <img src="src/images/background.png"/>
            <div class="bureau"><img src="src/images/simpledesk.png"/></div>
            <div class="computer"><img src="src/images/computer.png"/></div>
            <div class="joueur"><img src="src/images/user.png"></div>
        </div>
    </div>
</body>
